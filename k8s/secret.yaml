apiVersion: v1
kind: Secret
metadata:
  name: starlink-mcp
  namespace: starlink-mcp
type: Opaque
stringData:
  # Signs login-state cookies. Generate 32+ random chars and keep it stable
  # across pods/restarts, or all logins are invalidated on rollout.
  # Fill in before applying, or use `kubectl create secret` instead:
  #   kubectl create secret generic starlink-mcp \
  #     --namespace starlink-mcp \
  #     --from-literal=MCP_SESSION_SECRET="$(openssl rand -hex 32)"
  MCP_SESSION_SECRET: ""
