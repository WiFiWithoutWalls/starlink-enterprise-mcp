app = "starlink-enterprise-mcp"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  MCP_TRANSPORT = "http"
  MCP_PORT = "3000"
  NODE_ENV = "production"
  # Set these via `fly secrets set`:
  #   MCP_BASE_URL
  #   MCP_SESSION_SECRET
  #   STARLINK_API_URL      (optional — defaults to production)
  #   STARLINK_TOKEN_URL    (optional — defaults to production)

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.checks]
    [http_service.checks.health]
      interval = "30s"
      timeout = "5s"
      grace_period = "10s"
      method = "GET"
      path = "/health"

[mounts]
  source = "token_data"
  destination = "/home/nodejs/.starlink-mcp"
